
name: Documentation

on:
  push:
    branches: [main]
    # Only rebuild the site when something that feeds the mkdocs build
    # changes. src/** is included because mkdocstrings renders the API
    # Reference from the package source/docstrings; pyproject.toml + uv.lock
    # because the build installs the docs dependency group via uv sync.
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build documentation
        run: uv run poe docs

      # enablement: true makes the workflow turn on GitHub Pages (with the
      # "GitHub Actions" build source) on first run, instead of failing with
      # "Get Pages site failed / Not Found" when Pages has never been enabled.
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
