name: Create Release from Tag

# Stage 2 of the release pipeline:
#   ci.yml (tag on main commit) -> THIS (create release on tag push)
#   -> release.yml (build + publish to PyPI on release published)
#
# The release is created with RELEASE_TOKEN (a PAT/App token), NOT the default
# GITHUB_TOKEN. A release created by GITHUB_TOKEN cannot trigger another
# workflow, so using it here would silently break release.yml.
#
# Release notes are generated by git-cliff (cliff.toml) and stored only on the
# GitHub Release — the changelog is intentionally NOT committed back to the repo
# as a CHANGELOG.md file.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      # Full history + tags are required for git-cliff to build the changelog.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate release notes with git-cliff
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # --latest: only the section for the just-pushed tag.
          # --strip header: drop the global "# Changelog" preamble.
          args: -vv --latest --strip header
        env:
          # git-cliff writes to this file on the runner only; it is never
          # committed back to the repo. The release body comes from the
          # step's `content` output, not this file.
          OUTPUT: RELEASE_NOTES.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.git-cliff.outputs.content }}
          token: ${{ secrets.RELEASE_TOKEN }}
