name: Diag RELEASE_TOKEN

# TEMPORARY diagnostic. Measures the byte shape of RELEASE_TOKEN to confirm
# whether it contains illegal HTTP header bytes (CR/LF/control chars), WITHOUT
# ever emitting the token text. All legal token characters are stripped before
# anything is printed; only counts and the hex codes of illegal bytes are shown.
# Delete this workflow once the question is answered.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect RELEASE_TOKEN bytes (never prints the value)
        env:
          TOK: ${{ secrets.RELEASE_TOKEN }}
        run: |
          total=$(printf %s "$TOK" | wc -c)
          no_crlf=$(printf %s "$TOK" | tr -d '\r\n' | wc -c)
          cr=$(printf %s "$TOK" | tr -cd '\r' | wc -c)
          lf=$(printf %s "$TOK" | tr -cd '\n' | wc -c)
          # node-fetch's legal set is \t plus \x20-\x7e plus \x80-\xff; strip all
          # of those, leaving only illegal control bytes.
          illegal=$(printf %s "$TOK" | LC_ALL=C tr -d '\011\040-\176\200-\377' | wc -c)
          echo "total_bytes=$total"
          echo "cr_count(0x0d)=$cr"
          echo "lf_count(0x0a)=$lf"
          echo "other_illegal_control_bytes=$((illegal - cr - lf))"
          printf 'illegal_byte_codes_hex='
          printf %s "$TOK" | LC_ALL=C tr -d '\011\040-\176\200-\377' \
            | od -An -tx1 | tr -s ' \n' ' ' | sed 's/ $//'
          printf '\n'
          if [ "$illegal" -gt 0 ]; then
            echo "VERDICT: RELEASE_TOKEN contains illegal header byte(s) -> this is the Tag failure cause"
          else
            echo "VERDICT: no illegal header bytes in RELEASE_TOKEN (the cause is elsewhere)"
          fi
